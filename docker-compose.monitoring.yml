version: "3.8"

# Local monitoring stack for EdgePilot.
# Run: docker compose -f docker-compose.monitoring.yml up -d
# Then: make serve   (starts EdgePilot on localhost:8000)
#
# Grafana:    http://localhost:3000  (admin/admin)
# Prometheus: http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: edgepilot-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: edgepilot-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
